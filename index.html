                    "7: ريحة دخان غريب مكتوم طالعة من حمام السنتر."
                ],
                roles: [
                    { name: 'مستر عادل (مدرس الفيزياء)', public: 'المنافس اللي بيسقط طلاب الكيميا.', secret: 'أنت اللي قصيت سلك الكاميرا عشان كنت بتسرق مذكرات المستر وتنسبها لنفسك.' },
                    { name: 'أستاذ محسن (سكرتير السنتر)', public: 'المستر كان هيجرد الدفاتر لاكتشافه سرقة.', secret: 'الورقة اللي المستر كاتبها فيها اسمك، وكنت بتدور عليها.' },
                    { name: 'كراوية (الطالب الفاشل)', public: 'المستر طرده قدام الناس وشتمه.', secret: 'كنت بتشرب حشيش في الحمام والجاكت الأسود ده بتاعك.' },
                    { name: 'شهد (الطالبة الأولى)', public: 'خايفة حد يسبقها.', secret: 'الإجابات اللي على إيدك دي غش، وسرقتي ملزمة المستر عشان تمسحي إيدك من الحبر.' },
                    { name: 'الحاج مدبولي (ولي الأمر)', public: 'جاي يتخانق عشان المستر ضرب ابنه.', secret: 'أنت بلطجي ومطلوب القبض عليك، ومستخبي في السنتر.' },
                    { name: 'عم خميس (عامل النظافة)', public: 'بيأجر القاعات للمدخنين في السر.', secret: 'أنت اللي سرقت الفلوس اللي في درج الامتحانات وسبت الورق.' },
                    { name: 'أبلة ميرفت (مسؤولة الملازم)', public: 'بتبيع الملازم في مكتبة بره.', secret: 'أنتي اللي طبعتي الامتحانات المسربة وبعتيها للطلبة.' },
                    { name: 'مستر كريم (المدرس المساعد)', public: 'المستر بياخد مجهوده ومبيديلوش فلوس.', secret: 'التمثال ده بتاعك أصلاً وكنت جاي تاخده غصب عنه.' },
                    { name: 'أستاذ فكري (صاحب السنتر)', public: 'المستر كان هيسيب السنتر وياخد الطلبة.', secret: 'قفلت الباب من بره ورميت المفتاح من الشباك عشان ميهربش.' },
                    { name: 'عم راضي (بتاع الكشك)', public: 'المستر عمله محضر عشان بيبيع سجاير.', secret: 'كنت متفق مع الطالب الفاشل تبيعله ممنوعات جوه السنتر.' }
                ]
            }
        ];

        // --- محرك اللعبة (Game Engine) ---
        const App = () => {
            const [gameState, setGameState] = useState('HOME'); 
            const [mode, setMode] = useState('GM'); 
            const [playerCount, setPlayerCount] = useState(6);
            const [selectedScenario, setSelectedScenario] = useState(null);
            
            const [players, setPlayers] = useState([]);
            
            const [currentClueIndex, setCurrentClueIndex] = useState(-1);
            const [votes, setVotes] = useState({});
            const [tiedPlayers, setTiedPlayers] = useState([]);
            const [eliminatedPlayer, setEliminatedPlayer] = useState(null);
            const [lastVoteResult, setLastVoteResult] = useState(null);
            const [viewingPlayerIndex, setViewingPlayerIndex] = useState(null);
            const [showGMBoard, setShowGMBoard] = useState(false);
            const [winner, setWinner] = useState(null); 

            const handleSetupGame = (scenario, count, gameMode) => {
                setMode(gameMode);
                setPlayerCount(count);
                setSelectedScenario(scenario);
                const initialPlayers = Array.from({ length: count }, (_, i) => ({
                    id: i, name: '', roleData: null, isCriminal: false, isAlive: true
                }));
                setPlayers(initialPlayers);
                setGameState('NAMES');
            };

            const updatePlayerName = (index, newName) => {
                setPlayers(prev => prev.map((p, i) => i === index ? { ...p, name: newName } : p));
            };

            const handleDistributeRoles = () => {
                if (players.some(p => p.name.trim() === '')) {
                    alert('لازم تكتب أسامي كل المشتبه فيهم عشان نبدأ ياريس!');
                    return;
                }

                let criminalsCount = playerCount <= 4 ? 1 : playerCount <= 9 ? 2 : 3;
                let shuffledRoles = [...selectedScenario.roles].sort(() => 0.5 - Math.random());
                let selectedRoles = shuffledRoles.slice(0, playerCount);

                let indices = Array.from({ length: playerCount }, (_, i) => i);
                indices.sort(() => 0.5 - Math.random());
                const criminalIndices = indices.slice(0, criminalsCount);

                // تجهيز بيانات اللاعبين المبدئية لمعرفة أسماء الشركاء
                let draftPlayers = players.map((p, index) => {
                    const role = selectedRoles[index];
                    const isCriminal = criminalIndices.includes(index);
                    const criminalRank = criminalIndices.indexOf(index);
                    return { ...p, roleData: { ...role, roleType: '' }, isCriminal, criminalRank, originalSecret: role.secret };
                });

                // استخراج أسماء المجرمين عشان نظهرهم لبعض
                const criminalNames = draftPlayers.filter(p => p.isCriminal).map(p => p.name);

                // بناء الشكل النهائي للسر مع إضافة أسماء الشركاء
                const finalPlayers = draftPlayers.map((p) => {
                    let finalSecret = p.originalSecret;
                    let roleType = 'بريء (عنده مصيبة بس مش قاتل)';

                    if (p.isCriminal) {
                        if (p.criminalRank === 0) {
                            roleType = 'القاتل (الزعيم)';
                            finalSecret = `أنت القاتل الفعلي! الجريمة: (${selectedScenario.killerAction}). استخدم سرك الأصلي اللي هو (${p.originalSecret}) كحجة وعذر عشان تداري على جريمتك الأساسية! ودافع عن شركائك لو حسيت بخطر.`;
                        } else if (p.criminalRank === 1) {
                            roleType = 'الشريك (المتستر والمساعد)';
                            finalSecret = `أنت شريك القاتل! دورك في الجريمة كان: (${selectedScenario.partnerAction}). استخدم سرك الأصلي اللي هو (${p.originalSecret}) كحجة للتمويه. إياك تكشف القاتل ودافع عنه دايماً!`;
                        } else {
                            roleType = 'الشريك (التابع)';
                            finalSecret = `أنت التابع لعصابة القتل! دورك كان: (${selectedScenario.thirdPartnerAction}). استخدم سرك الأصلي اللي هو (${p.originalSecret}) للهروب من الشك. مهمتك تشتت الانتباه عن العصابة!`;
                        }

                        // إضافة أسماء الشركاء في السر
                        const otherCriminals = criminalNames.filter(name => name !== p.name);
                        if (otherCriminals.length > 0) {
                            finalSecret += `\n\n⚠️ شركاؤك في العصابة هما: ${otherCriminals.join(' و ')}`;
                        }
                    }

                    return { ...p, roleData: { ...p.roleData, finalSecret, roleType } };
                });

                setPlayers(finalPlayers);
                setGameState('INTRO_ROLES');
            };

            const startGamePhase = () => {
                setCurrentClueIndex(0); 
                setGameState('GAME');
            };

            const startVotingPhase = () => {
                setVotes({});
                setGameState('VOTING');
            };

            const handleVote = (targetId) => {
                const aliveCount = players.filter(p => p.isAlive).length;
                let expectedVotes = gameState === 'TIE_BREAKER' ? aliveCount - tiedPlayers.length : aliveCount;
                if (expectedVotes <= 0) expectedVotes = aliveCount; 

                setVotes(prev => {
                    const currentTotal = Object.values(prev).reduce((a, b) => a + b, 0);
                    const currentTargetVotes = prev[targetId] || 0;
                    
                    let maxTargetVotes = expectedVotes;
                    if (gameState === 'VOTING') {
                        maxTargetVotes = Math.max(1, expectedVotes - 1);
                    }
                    
                    if (currentTargetVotes >= maxTargetVotes) {
                        alert(`مش منطقي إن اللاعب يصوت لنفسه للإعدام! أقصى عدد أصوات يقدر ياخده هو ${maxTargetVotes}.`);
                        return prev;
                    }

                    if (currentTotal < expectedVotes) {
                        return { ...prev, [targetId]: currentTargetVotes + 1 };
                    } else {
                        alert(`مش هينفع تسجل أصوات تانية! الحد الأقصى للتصويت دلوقتي هو ${expectedVotes} أصوات بس.`);
                        return prev;
                    }
                });
            };

            const submitVotes = () => {
                const aliveCount = players.filter(p => p.isAlive).length;
                let expectedVotes = gameState === 'TIE_BREAKER' ? aliveCount - tiedPlayers.length : aliveCount;
                if (expectedVotes <= 0) expectedVotes = aliveCount; 

                const totalVotesCast = Object.values(votes).reduce((a, b) => a + b, 0);
                if (totalVotesCast !== expectedVotes) {
                    alert(`لازم ${expectedVotes} أصوات بالظبط تتسجل! إنتو مسجلين ${totalVotesCast}`);
                    return;
                }

                setLastVoteResult({...votes});

                let maxVotes = 0;
                let targets = [];
                for (const [idStr, count] of Object.entries(votes)) {
                    if (count > maxVotes) {
                        maxVotes = count;
                        targets = [parseInt(idStr)];
                    } else if (count === maxVotes) {
                        targets.push(parseInt(idStr));
                    }
                }

                if (targets.length === 1) {
                    executeElimination(targets[0]);
                } else if (targets.length > 1) {
                    setTiedPlayers(targets);
                    setVotes({});
                    setGameState('TIE_BREAKER');
                }
            };

            const executeElimination = (playerId) => {
                const updatedPlayers = players.map(p => p.id === playerId ? { ...p, isAlive: false } : p);
                setPlayers(updatedPlayers);
                setEliminatedPlayer(updatedPlayers.find(p => p.id === playerId));
                setTiedPlayers([]); 
                setGameState('ELIMINATED');
            };

            const proceedAfterElimination = () => {
                const aliveCriminals = players.filter(p => p.isAlive && p.isCriminal).length;
                const aliveInnocents = players.filter(p => p.isAlive && !p.isCriminal).length;

                if (aliveCriminals === 0) {
                    setWinner('INNOCENT');
                    setGameState('END');
                } else if (aliveCriminals > aliveInnocents || (aliveCriminals === 1 && aliveInnocents === 1)) {
                    setWinner('CRIMINAL');
                    setGameState('END');
                } else {
                    if (currentClueIndex < selectedScenario.clues.length - 1) {
                        setCurrentClueIndex(prev => prev + 1);
                    }
                    setGameState('GAME');
                }
            };

            // --- مكونات شاشات اللعبة ---

            const renderHome = () => (
                <div className="max-w-5xl mx-auto p-6 text-center animate-fade-in">
                    <div className="mb-8">
                        <Icon name="fingerprint" className="w-20 h-20 text-red-600 mx-auto mb-4 drop-shadow-[0_0_20px_rgba(220,38,38,0.6)]" />
                        <h1 className="text-6xl md:text-8xl font-black text-transparent bg-clip-text bg-gradient-to-r from-red-600 via-rose-500 to-amber-500 drop-shadow-2xl mb-2">كشف المستور</h1>
                        <h2 className="text-2xl text-slate-300 font-bold tracking-widest">لُـعـبـة الـشـك</h2>
                        <div className="mt-4 inline-block bg-red-900/40 px-4 py-1.5 rounded-full border border-red-500/30">
                            <span className="text-red-300 font-bold text-sm tracking-wider">النسخة المصرية الاحترافية</span>
                        </div>
                    </div>

                    <div className="grid md:grid-cols-2 gap-8 text-right">
                        <div className="glass-panel p-8 rounded-3xl border-t-4 border-amber-500 relative overflow-hidden">
                            <Icon name="lock" className="w-32 h-32 absolute -top-10 -right-10 text-amber-500/10 rotate-12" />
                            <h2 className="text-2xl font-black text-white mb-6 relative z-10">⚙️ ظبط الجلسة</h2>
                            <div className="mb-6 relative z-10">
                                <label className="block text-slate-300 font-bold mb-3">عدد المشتبه فيهم ({playerCount}):</label>
                                <div className="flex gap-2 flex-wrap">
                                    {[4,5,6,7,8,9,10].map(n => (
                                        <button key={n} onClick={() => setPlayerCount(n)} className={`w-12 h-12 rounded-xl font-black text-xl transition-all ${playerCount === n ? 'bg-gradient-to-br from-amber-400 to-amber-600 text-slate-900 scale-110 shadow-lg' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'}`}>
                                            {n}
                                        </button>
                                    ))}
                                </div>
                                <p className="text-sm text-amber-400 mt-4 font-bold bg-slate-900/60 p-3 rounded-lg border border-slate-700">
                                    المجرمين في العدد ده: <span className="text-white">{playerCount <= 4 ? '1 قاتل' : playerCount <= 9 ? '2 مجرمين' : '3 مجرمين'}</span>
                                </p>
                            </div>
                            <div className="relative z-10">
                                <label className="block text-slate-300 font-bold mb-3">نظام الموبايل (إدارة اللعبة):</label>
                                <div className="flex gap-3">
                                    <button onClick={() => setMode('GM')} className={`flex-1 p-4 rounded-xl font-bold flex flex-col items-center gap-2 transition ${mode === 'GM' ? 'bg-blue-600/20 border-2 border-blue-500 text-blue-400' : 'bg-slate-800 border-2 border-transparent hover:bg-slate-700'}`}>
                                        <Icon name="user-cog" className="w-6 h-6" /> مدير خفي
                                    </button>
                                    <button onClick={() => setMode('PLAYER')} className={`flex-1 p-4 rounded-xl font-bold flex flex-col items-center gap-2 transition ${mode === 'PLAYER' ? 'bg-purple-600/20 border-2 border-purple-500 text-purple-400' : 'bg-slate-800 border-2 border-transparent hover:bg-slate-700'}`}>
                                        <Icon name="users" className="w-6 h-6" /> مفيش مدير
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div className="glass-panel p-8 rounded-3xl border-t-4 border-red-600 flex flex-col max-h-[500px]">
                            <h2 className="text-2xl font-black text-white mb-4">📖 ملفات القضايا</h2>
                            <div className="overflow-y-auto custom-scrollbar pr-2 space-y-3 flex-1">
                                {SCENARIOS.map(s => (
                                    <div key={s.id} onClick={() => handleSetupGame(s, playerCount, mode)} className="bg-slate-800/80 hover:bg-slate-700 p-4 rounded-xl cursor-pointer border border-slate-700 hover:border-red-500 transition-all group">
                                        <h3 className="font-black text-lg text-amber-400 group-hover:text-amber-300 flex justify-between items-center">
                                            {s.title}
                                            <Icon name="chevron-left" className="w-4 h-4 opacity-0 group-hover:opacity-100 transition" />
                                        </h3>
                                        <p className="text-xs text-slate-300 line-clamp-2 mt-2 font-semibold leading-relaxed">{s.description}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                    <div className="mt-10 text-center text-slate-500 font-bold tracking-widest text-sm flex items-center justify-center gap-2 opacity-80">
                        كل الحقوق محفوظة لـ <span className="migz-signature font-black text-lg">ميجز</span>
                    </div>
                </div>
            );

            const renderNames = () => (
                <div className="max-w-2xl mx-auto p-6 animate-fade-in text-center">
                    <h2 className="text-4xl font-black mb-8 text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-amber-600">سجل أسماء المشتبه بهم</h2>
                    <div className="glass-panel p-8 rounded-3xl space-y-4 text-right">
                        {players.map((p, i) => (
                            <div key={i} className="flex items-center gap-4">
                                <span className="bg-slate-800 text-slate-300 w-12 h-12 flex-shrink-0 flex items-center justify-center rounded-xl font-black border border-slate-700 text-xl">{i + 1}</span>
                                <input 
                                    type="text" placeholder={`اسم المشتبه به ${i + 1}`}
                                    className="flex-1 bg-slate-900 border-2 border-slate-700 rounded-xl px-5 py-4 text-white font-bold text-lg focus:outline-none focus:border-amber-500 transition"
                                    value={p.name} onChange={(e) => updatePlayerName(i, e.target.value)}
                                />
                            </div>
                        ))}
                        <div className="flex gap-4 mt-10">
                            <button onClick={() => setGameState('HOME')} className="flex-1 bg-slate-800 hover:bg-slate-700 text-white py-5 rounded-2xl font-black text-xl shadow-lg transition active:scale-95 border border-slate-600">
                                رجوع
                            </button>
                            <button onClick={handleDistributeRoles} className="flex-[2] bg-gradient-to-r from-red-600 to-red-800 hover:from-red-500 hover:to-red-700 text-white py-5 rounded-2xl font-black text-xl md:text-2xl shadow-xl transition active:scale-95 border-b-4 border-red-950">
                                توزيع الأدوار ➔
                            </button>
                        </div>
                    </div>
                </div>
            );

            const renderIntroRoles = () => (
                <div className="max-w-4xl mx-auto p-6 animate-fade-in text-center">
                    <div className="mb-10 glass-panel p-8 rounded-3xl border-b-4 border-amber-500 relative overflow-hidden">
                        <h2 className="text-4xl font-black text-amber-400 mb-3 relative z-10">مرحلة الأسرار</h2>
                        <p className="text-slate-300 font-bold text-lg relative z-10">كل لاعب يمسك الموبايل لوحده، يحفظ دوره وسره، ويسلمه للي بعده.</p>
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-3 gap-5 mb-10">
                        {players.map((p, i) => (
                            <button key={i} onClick={() => setViewingPlayerIndex(i)} className="bg-slate-800 hover:bg-slate-700 border-2 border-slate-600 p-6 rounded-2xl font-black text-xl transition active:scale-95 flex flex-col items-center gap-3">
                                <Icon name="user-search" className="w-8 h-8 text-amber-500" />
                                {p.name || `لاعب ${i+1}`}
                            </button>
                        ))}
                    </div>

                    <button onClick={() => setGameState('PUBLIC_INTRO')} className="w-full bg-green-600 hover:bg-green-500 text-white py-5 rounded-2xl font-black text-2xl shadow-xl transition active:scale-95 border-b-4 border-green-800">
                        الكل شاف أسراره.. اقرأ قصة الجريمة ➔
                    </button>

                    {viewingPlayerIndex !== null && (
                        <div className="fixed inset-0 bg-black/95 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
                            <div className="bg-slate-900 border-2 border-amber-500 rounded-3xl p-8 max-w-md w-full text-right shadow-2xl relative">
                                <h2 className="text-4xl font-black text-amber-400 mb-6 border-b border-slate-700 pb-4">{players[viewingPlayerIndex].name}</h2>
                                
                                <div className="bg-slate-800 p-5 rounded-xl mb-5 border border-slate-700">
                                    <span className="text-slate-400 text-sm font-bold block mb-1">الناس هتعرفك بإنك:</span>
                                    <p className="text-2xl font-black text-white">{players[viewingPlayerIndex].roleData.name}</p>
                                    <p className="text-sm text-amber-100 font-semibold mt-3 leading-relaxed bg-black/30 p-3 rounded">{players[viewingPlayerIndex].roleData.public}</p>
                                </div>

                                <div className={`p-6 rounded-xl mb-8 border-l-4 ${players[viewingPlayerIndex].isCriminal ? 'bg-red-950/60 border-red-500' : 'bg-blue-950/60 border-blue-500'}`}>
                                    <span className="text-slate-300 text-sm font-bold block mb-2 flex items-center gap-2">
                                        <Icon name="key" className="w-4 h-4" /> حقيقتك المدارية (سر خطير):
                                    </span>
                                    <p className={`text-2xl font-black mb-3 ${players[viewingPlayerIndex].isCriminal ? 'text-red-400' : 'text-blue-400'}`}>
                                        أنت: {players[viewingPlayerIndex].roleData.roleType}
                                    </p>
                                    <p className="text-white text-base font-semibold leading-relaxed whitespace-pre-wrap">
                                        {players[viewingPlayerIndex].roleData.finalSecret}
                                    </p>
                                </div>

                                <button onClick={() => setViewingPlayerIndex(null)} className="w-full bg-slate-700 hover:bg-slate-600 py-4 rounded-xl font-black text-white text-lg flex justify-center items-center gap-2 border border-slate-500">
                                    <Icon name="eye-off" className="w-6 h-6" /> قريت السر.. إقفل الشاشة
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );

            const renderPublicIntro = () => (
                <div className="max-w-4xl mx-auto p-6 animate-fade-in">
                    <div className="glass-panel p-8 rounded-3xl border-r-4 border-red-600 mb-8 text-right relative overflow-hidden">
                        <Icon name="siren" className="w-32 h-32 absolute -top-10 -left-10 text-red-500/10" />
                        <h2 className="text-3xl font-black text-red-500 flex items-center gap-3 mb-4 relative z-10"><Icon name="alert-triangle" className="w-8 h-8" /> تفاصيل الجريمة</h2>
                        <p className="text-xl text-slate-100 font-bold leading-relaxed relative z-10">{selectedScenario.description}</p>
                    </div>

                    <div className="bg-slate-900 p-8 rounded-3xl border border-slate-700 text-right shadow-xl">
                        <h3 className="text-2xl font-black text-amber-400 mb-6 border-b border-slate-700 pb-4">اقرأ الشبهات دي بصوت عالي قدام الكل:</h3>
                        <div className="space-y-4 max-h-[45vh] overflow-y-auto custom-scrollbar pr-3">
                            {players.map(p => (
                                <div key={p.id} className="bg-slate-800 p-5 rounded-xl border border-slate-600 hover:border-amber-500 transition">
                                    <span className="font-black text-xl text-white">{p.name} <span className="text-sm text-slate-400 block mt-1">{p.roleData.name}</span></span>
                                    <p className="text-amber-200 text-sm font-semibold mt-3 bg-black/40 p-3 rounded-lg border border-slate-700">الدافع المُعلن للشك: {p.roleData.public}</p>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="text-center mt-8">
                        <button onClick={startGamePhase} className="bg-red-600 hover:bg-red-500 text-white w-full py-5 rounded-2xl font-black text-2xl shadow-[0_0_20px_rgba(220,38,38,0.5)] transition active:scale-95 animate-pulse">
                            بدء التحقيقات وكشف الدليل الأول ➔
                        </button>
                    </div>
                </div>
            );

            const renderGame = () => {
                const alivePlayers = players.filter(p => p.isAlive);
                const isOutOfClues = currentClueIndex >= selectedScenario.clues.length - 1;
                const currentRound = currentClueIndex + 1;

                return (
                    <div className="max-w-6xl mx-auto p-4 md:p-6 animate-fade-in">
                        <div className="flex flex-col md:flex-row justify-between items-center mb-8 bg-slate-900 p-5 rounded-3xl border border-slate-700 shadow-lg gap-4">
                            <h2 className="text-2xl font-black text-amber-400 flex items-center gap-3">
                                <Icon name="gavel" className="w-6 h-6 text-red-500" />
                                {selectedScenario.title} 
                                <span className="text-sm bg-red-900 text-white px-3 py-1.5 rounded-lg border border-red-500/50">الجولة {currentRound}</span>
                            </h2>
                            {mode === 'GM' && (
                                <button onClick={() => setShowGMBoard(!showGMBoard)} className="text-blue-400 font-bold text-sm bg-blue-900/20 px-4 py-2 rounded-lg flex items-center gap-2 border border-blue-500/50 hover:bg-blue-900/40 transition">
                                    <Icon name="eye" className="w-5 h-5" /> شاشة المدير السري
                                </button>
                            )}
                        </div>

                        <div className="grid md:grid-cols-3 gap-8 text-right">
                            <div className="md:col-span-2 space-y-6">
                                <div className="glass-panel p-8 rounded-3xl border-t-4 border-blue-500 relative">
                                    <h3 className="font-black text-2xl text-white mb-6 flex items-center gap-3 border-b border-slate-700 pb-4"><Icon name="search" className="w-6 h-6 text-blue-400" /> ملف الأدلة</h3>
                                    
                                    <div className="space-y-4">
                                        {selectedScenario.clues.map((clue, idx) => (
                                            <div key={idx} className={`p-5 rounded-2xl transition-all duration-500 ${idx === currentClueIndex ? 'bg-blue-900/30 border-2 border-blue-400 shadow-[0_0_15px_rgba(59,130,246,0.2)] scale-[1.01]' : idx < currentClueIndex ? 'bg-slate-800 border-r-4 border-slate-600 opacity-75' : 'hidden'}`}>
                                                <p className="text-xl text-white font-bold leading-relaxed">{clue}</p>
                                            </div>
                                        ))}
                                    </div>

                                    {isOutOfClues && (
                                        <div className="mt-8 p-5 bg-red-950/40 rounded-2xl text-center border-2 border-red-500/50 flex flex-col items-center gap-2">
                                            <Icon name="alert-triangle" className="w-8 h-8 text-red-500" />
                                            <p className="text-red-400 font-black text-xl">مفيش أدلة تانية! كملوا نقاش وتصويت بناءً على اللي فات.</p>
                                        </div>
                                    )}
                                </div>

                                <div className="text-center pt-4">
                                    <button onClick={startVotingPhase} className="bg-red-600 hover:bg-red-500 text-white w-full py-5 rounded-2xl font-black text-2xl shadow-[0_0_30px_rgba(220,38,38,0.3)] transition active:scale-95 flex justify-center items-center gap-3">
                                        <Icon name="user-x" className="w-7 h-7" />
                                        بدء المحاكمة والتصويت
                                    </button>
                                </div>
                            </div>

                            <div className="space-y-6">
                                <div className="bg-slate-900 p-6 rounded-3xl border border-slate-700 sticky top-6 shadow-xl">
                                    <h3 className="font-black text-amber-400 text-xl mb-5 border-b border-slate-700 pb-4 flex justify-between items-center">
                                        المشتبه بهم 
                                        <span className="bg-slate-800 text-white text-sm px-3 py-1 rounded-lg">{alivePlayers.length} أحياء</span>
                                    </h3>
                                    <ul className="space-y-3">
                                        {players.map(p => (
                                            <li key={p.id} className={`p-4 rounded-xl flex items-center justify-between font-bold border transition ${p.isAlive ? 'bg-slate-800 border-slate-600 text-white shadow-md' : 'bg-slate-950 border-red-950 text-slate-600 eliminated-player'}`}>
                                                <div>
                                                    <span className="text-base">{p.name}</span>
                                                    <span className="block text-xs font-normal mt-1 opacity-70">{p.roleData.name}</span>
                                                </div>
                                                {p.isAlive ? <Icon name="user" className="w-5 h-5 text-green-500 drop-shadow-[0_0_5px_rgba(34,197,94,0.5)]" /> : <Icon name="skull" className="w-5 h-5 text-red-700" />}
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                            </div>
                        </div>

                        {/* شاشة المدير */}
                        {showGMBoard && mode === 'GM' && (
                            <div className="fixed inset-0 bg-black/95 z-50 p-6 overflow-y-auto backdrop-blur-sm">
                                <div className="max-w-5xl mx-auto bg-slate-900 border-2 border-blue-500 rounded-3xl p-8 text-right shadow-2xl">
                                    <div className="flex justify-between items-center mb-8 border-b border-slate-700 pb-5">
                                        <h2 className="text-4xl font-black text-blue-400 flex items-center gap-3"><Icon name="eye" className="w-10 h-10" /> عيون المدير السري</h2>
                                        <button onClick={() => setShowGMBoard(false)} className="bg-slate-800 p-3 rounded-xl hover:bg-red-600 text-white transition"><Icon name="x" className="w-6 h-6" /></button>
                                    </div>
                                    <div className="grid md:grid-cols-2 gap-5">
                                        {players.map(p => (
                                            <div key={p.id} className={`p-5 rounded-2xl border ${p.isCriminal ? 'bg-red-950/50 border-red-500 shadow-inner' : 'bg-slate-800 border-slate-700'} ${!p.isAlive && 'opacity-40'}`}>
                                                <div className="flex justify-between items-center font-black text-xl text-white mb-3">
                                                    <span>{p.name} {!p.isAlive && <span className="text-red-500 text-sm ml-2">(تم إعدامه)</span>}</span>
                                                    <span className={`px-3 py-1 rounded-lg text-sm ${p.isCriminal ? 'bg-red-600 text-white' : 'bg-blue-900 text-blue-300'}`}>{p.roleData.roleType}</span>
                                                </div>
                                                <p className="text-sm text-slate-300 mb-2 border-b border-slate-700/50 pb-2">{p.roleData.name}</p>
                                                <p className="text-sm text-amber-200 font-semibold bg-black/50 p-3 rounded-lg leading-relaxed whitespace-pre-wrap">{p.roleData.finalSecret}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            const renderVoting = () => (
                <div className="max-w-3xl mx-auto p-6 text-center animate-fade-in">
                    <Icon name="gavel" className="w-20 h-20 text-red-600 mx-auto mb-4 drop-shadow-[0_0_15px_rgba(220,38,38,0.5)]" />
                    <h2 className="text-5xl font-black text-white mb-4">محكمة الشارع</h2>
                    <p className="text-slate-300 font-bold mb-8 bg-slate-800 p-4 rounded-xl inline-block border border-slate-700 text-lg">سجل الأصوات للإعدام (لكل لاعب حي حق التصويت)</p>

                    <div className="grid sm:grid-cols-2 gap-5 mb-10">
                        {players.filter(p=>p.isAlive).map(p => (
                            <div key={p.id} className="bg-slate-800 p-5 rounded-2xl flex justify-between items-center border border-slate-700 hover:border-amber-500 transition">
                                <span className="text-2xl font-black text-amber-400">{p.name}</span>
                                <div className="flex items-center gap-3">
                                    <span className="text-2xl font-black text-white bg-slate-900 w-12 h-12 rounded-xl flex items-center justify-center border border-slate-600 shadow-inner">{votes[p.id] || 0}</span>
                                    <div className="flex flex-col gap-1">
                                        <button onClick={() => handleVote(p.id)} className="bg-red-600 p-2 rounded-lg hover:bg-red-500 active:scale-90 transition"><Icon name="chevron-up" className="text-white w-5 h-5" /></button>
                                        {votes[p.id] > 0 && <button onClick={() => setVotes(prev => ({...prev, [p.id]: prev[p.id]-1}))} className="bg-slate-700 p-2 rounded-lg hover:bg-slate-600 active:scale-90 transition"><Icon name="chevron-down" className="text-white w-5 h-5" /></button>}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="flex gap-5">
                        <button onClick={() => setGameState('GAME')} className="flex-1 bg-slate-800 py-5 rounded-2xl font-black text-white hover:bg-slate-700 text-xl border border-slate-600">رجوع للنقاش</button>
                        <button onClick={submitVotes} className="flex-2 w-2/3 bg-red-600 hover:bg-red-500 py-5 rounded-2xl font-black text-white shadow-[0_0_20px_rgba(220,38,38,0.5)] text-2xl transition active:scale-95">إعلان قرار الإعدام ➔</button>
                    </div>
                </div>
            );

            const renderTieBreaker = () => (
                <div className="max-w-2xl mx-auto p-6 text-center animate-fade-in">
                    <Icon name="swords" className="w-20 h-20 text-amber-500 mx-auto mb-4 animate-bounce" />
                    <h2 className="text-5xl font-black text-amber-500 mb-4 drop-shadow-lg">تعادل في الأصوات!</h2>
                    <p className="text-2xl text-slate-300 font-bold mb-6">الأصوات اتعادلت بين:<br/><span className="text-red-400 block mt-3 text-4xl font-black">{tiedPlayers.map(id => players.find(p => p.id === id).name).join(' و ')}</span></p>
                    <div className="bg-red-950/40 border-2 border-red-500/50 p-6 rounded-3xl mb-8 font-bold leading-relaxed text-red-200 text-lg">
                        المتعادلين يدافعوا عن نفسهم لمدة دقيقة.<br/>وبعدين <span className="text-white">باقي الأحياء بس</span> هما اللي يصوتوا عليهم للتصفية.
                    </div>
                    <div className="grid gap-4 mb-8">
                        {tiedPlayers.map(id => (
                            <div key={id} className="bg-slate-900 p-5 rounded-2xl flex justify-between items-center border border-amber-500/50">
                                <span className="text-2xl font-black text-white">{players.find(p=>p.id===id).name}</span>
                                <div className="flex items-center gap-4">
                                    <span className="text-3xl font-black text-amber-400 bg-black w-14 h-14 rounded-xl flex items-center justify-center border border-slate-700">{votes[id] || 0}</span>
                                    <button onClick={() => handleVote(id)} className="bg-amber-600 p-4 rounded-xl hover:bg-amber-500"><Icon name="plus" className="text-white w-6 h-6" /></button>
                                    {votes[id] > 0 && <button onClick={() => setVotes(prev => ({...prev, [id]: prev[id]-1}))} className="bg-slate-800 p-4 rounded-xl"><Icon name="minus" className="text-white w-6 h-6" /></button>}
                                </div>
                            </div>
                        ))}
                    </div>
                    <button onClick={submitVotes} className="w-full bg-red-600 hover:bg-red-500 py-5 rounded-2xl font-black text-white text-2xl shadow-xl">حسم النتيجة النهائية</button>
                </div>
            );

            const renderEliminated = () => (
                <div className="max-w-2xl mx-auto p-6 text-center animate-fade-in">
                    <div className="bg-slate-900/90 p-6 rounded-3xl mb-8 border border-slate-700 shadow-lg inline-block">
                        <h4 className="text-amber-400 font-black mb-4 text-lg">نتيجة التصويت النهائية:</h4>
                        <div className="flex flex-wrap justify-center gap-3">
                            {lastVoteResult && Object.entries(lastVoteResult).map(([id, count]) => count > 0 && (
                                <span key={id} className="bg-slate-800 text-white px-4 py-2 rounded-xl text-base font-bold border border-slate-600 flex items-center gap-2">
                                    {players.find(p => p.id === parseInt(id))?.name} <span className="bg-red-900 text-red-300 px-2 py-0.5 rounded text-sm">{count}</span>
                                </span>
                            ))}
                        </div>
                    </div>

                    <div className="mb-8">
                        <Icon name="skull" className="w-24 h-24 text-red-600 mx-auto mb-4 animate-pulse drop-shadow-[0_0_20px_rgba(220,38,38,0.8)]" />
                        <h2 className="text-6xl font-black text-red-500 mb-2">إعدام!</h2>
                        <p className="text-2xl text-white font-bold">تم استبعاد <span className="text-amber-400 font-black text-4xl block mt-2">{eliminatedPlayer.name}</span></p>
                    </div>

                    <div className={`p-8 rounded-3xl border-4 shadow-2xl relative overflow-hidden ${eliminatedPlayer.isCriminal ? 'bg-red-950/80 border-red-500 shadow-[0_0_40px_rgba(239,68,68,0.3)]' : 'bg-blue-950/80 border-blue-500 shadow-[0_0_40px_rgba(59,130,246,0.3)]'}`}>
                        <div className="absolute top-0 right-0 w-full h-full bg-black/20 z-0"></div>
                        <h3 className="text-2xl font-black mb-2 text-white relative z-10">اللاعب ده طلع:</h3>
                        <p className={`text-6xl font-black mb-6 relative z-10 ${eliminatedPlayer.isCriminal ? 'text-red-500' : 'text-blue-400'}`}>
                            {eliminatedPlayer.isCriminal ? 'مجرم 🔪' : 'بريء 🕊️'}
                        </p>
                        <div className="bg-black/60 p-6 rounded-2xl border border-slate-700/50 text-right relative z-10">
                            <span className="text-slate-400 text-sm font-bold block mb-2"><Icon name="info" className="w-4 h-4 inline mr-1" /> السر اللي كان مخبيه:</span>
                            <span className="text-white text-xl font-semibold leading-relaxed whitespace-pre-wrap block">{eliminatedPlayer.roleData.finalSecret}</span>
                        </div>
                    </div>

                    <button onClick={proceedAfterElimination} className="mt-10 bg-slate-800 hover:bg-slate-700 py-5 w-full rounded-2xl font-black text-white text-2xl border border-slate-600 shadow-xl transition active:scale-95">
                        استكمال اللعبة ➔
                    </button>
                </div>
            );

            const renderEnd = () => {
                const isInnocentWin = winner === 'INNOCENT';
                return (
                    <div className="max-w-4xl mx-auto p-6 text-center animate-fade-in flex flex-col items-center justify-center min-h-[80vh]">
                        <Icon name={isInnocentWin ? "shield-check" : "skull"} className={`w-40 h-40 mb-6 drop-shadow-[0_0_30px_rgba(255,255,255,0.2)] ${isInnocentWin ? 'text-blue-500' : 'text-red-600 animate-pulse'}`} />
                        <h1 className={`text-6xl md:text-8xl font-black mb-6 drop-shadow-xl ${isInnocentWin ? 'text-blue-400' : 'text-red-500'}`}>
                            {isInnocentWin ? 'العدالة انتصرت!' : 'المجرمين انتصروا!'}
                        </h1>
                        <p className="text-2xl text-slate-200 font-bold mb-12 bg-slate-900/60 p-5 rounded-2xl border border-slate-700 w-full max-w-2xl leading-relaxed">
                            {isInnocentWin ? 'مبروك! الأبرياء قدروا يكشفوا كل القتلة ويطردوهم برا اللعبة.' : 'للأسف.. المجرمين بقوا أغلبية أو اتبقى قاتل واحد قصاد بريء واحد ومستحيل الأبرياء يكسبوا التصويت. اللعبة انتهت بكارثة.'}
                        </p>

                        <div className="grid md:grid-cols-2 gap-8 text-right w-full mb-12">
                            <div className="glass-panel p-8 rounded-3xl border-t-4 border-red-600">
                                <h3 className="text-2xl font-black text-red-400 mb-5 border-b border-red-900/50 pb-3 flex items-center gap-3"><Icon name="skull" className="w-7 h-7" /> عصابة المجرمين</h3>
                                <ul className="space-y-4 font-bold text-xl">
                                    {players.filter(p=>p.isCriminal).map(p=><li key={p.id} className="text-white flex justify-between items-center bg-red-950/30 p-3 rounded-xl border border-red-900/50">{p.name} <span className="text-sm text-red-200 bg-red-600 px-3 py-1 rounded-lg shadow">{p.roleData.roleType}</span></li>)}
                                </ul>
                            </div>
                            <div className="glass-panel p-8 rounded-3xl border-t-4 border-blue-600">
                                <h3 className="text-2xl font-black text-blue-400 mb-5 border-b border-blue-900/50 pb-3 flex items-center gap-3"><Icon name="users" className="w-7 h-7" /> الأبرياء</h3>
                                <ul className="space-y-4 font-bold text-xl">
                                    {players.filter(p=>!p.isCriminal).map(p=><li key={p.id} className="text-white bg-slate-800 p-3 rounded-xl border border-slate-700">{p.name}</li>)}
                                </ul>
                            </div>
                        </div>

                        <button onClick={() => window.location.reload()} className="bg-gradient-to-r from-amber-600 to-amber-800 hover:from-amber-500 py-5 px-16 rounded-2xl font-black text-white text-3xl shadow-[0_0_30px_rgba(245,158,11,0.4)] transition active:scale-95 border-b-4 border-amber-950">
                            العب قصة جديدة
                        </button>
                    </div>
                );
            };

            let view = null;
            switch(gameState) {
                case 'HOME': view = renderHome(); break;
                case 'NAMES': view = renderNames(); break;
                case 'INTRO_ROLES': view = renderIntroRoles(); break;
                case 'PUBLIC_INTRO': view = renderPublicIntro(); break;
                case 'GAME': view = renderGame(); break;
                case 'VOTING': view = renderVoting(); break;
                case 'TIE_BREAKER': view = renderTieBreaker(); break;
                case 'ELIMINATED': view = renderEliminated(); break;
                case 'END': view = renderEnd(); break;
            }

            return <div className="py-8">{view}</div>;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
